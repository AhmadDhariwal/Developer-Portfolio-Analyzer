groups:
  - name: dpa-alerts
    rules:
      - alert: DPAHighLatency
        expr: histogram_quantile(0.95, sum(rate(dpa_http_request_duration_ms_bucket[5m])) by (le)) > 1.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency"
          description: "P95 latency is above 1.8s for 5 minutes."

      - alert: DPAHighErrorRate
        expr: (sum(rate(dpa_http_errors_total[5m])) / sum(rate(dpa_http_requests_total[5m]))) > 0.2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High API error rate"
          description: "5xx error rate is above 20% for 5 minutes."
