<aside class="sidebar" [class.closed]="!isOpen">
  <div class="sidebar-header">
    <div class="logo-container">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zm0 10l-10 5 10 5 10-5-10-5z"></path>
          <path d="M2 17l10 5 10-5"></path>
        </svg>
      </div>
      <span class="logo-text">DevInsight <span>AI</span></span>
    </div>
  </div>
  <div class="sidebar-content">
    <nav class="nav-menu">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="nav-item">
        <div class="nav-icon" [innerHTML]="getIcon(item.icon)"></div>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>
  </div>

  <div class="sidebar-footer">
    <a (click)="logout()" class="footer-item logout-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      <span>Logout</span>
    </a>
  </div>
</aside>
