<div class="filters-panel" [class.collapsed]="isCollapsed">
  <div class="filters-header">
    <div class="header-left">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="filter-icon">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
      </svg>
      <div>
        <h3 class="filters-title">Refine Jobs</h3>
        <p class="filters-subtitle">Stage filters, then apply them together</p>
      </div>
      <span class="active-dot" *ngIf="hasActiveFilters">{{ activeCount }}</span>
    </div>

    <div class="header-actions">
      <span class="status-pill" *ngIf="isApplying">Applying...</span>
      <button class="btn-clear" *ngIf="hasDraftFilters" (click)="resetFilters()">Reset</button>
      <button
        class="btn-collapse"
        (click)="toggleCollapse()"
        [attr.aria-label]="isCollapsed ? 'Expand filters' : 'Collapse filters'"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" [class.rotated]="isCollapsed">
          <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
      </button>
    </div>
  </div>

  <div class="filters-body" *ngIf="!isCollapsed">
    <div class="filter-group">
      <label class="group-label">Skill Search</label>
      <div class="skills-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input
          type="text"
          name="job-skills-search"
          [(ngModel)]="filters.skills"
          (ngModelChange)="onFilterChange()"
          placeholder="Search React, Docker, APIs..."
        />
        <button class="btn-inline-clear" *ngIf="filters.skills" type="button" (click)="clearSkill()">Clear</button>
      </div>
    </div>

    <div class="filter-group">
      <label class="group-label">Platform</label>
      <div class="btn-group">
        <button
          *ngFor="let option of platformOptions"
          class="filter-btn"
          [class.active]="filters.platform === option.value"
          (click)="filters.platform = option.value; onFilterChange()"
        >
          {{ option.label }}
        </button>
      </div>
    </div>

    <div class="filter-group">
      <label class="group-label">Experience Level</label>
      <div class="btn-group">
        <button
          *ngFor="let option of experienceOptions"
          class="filter-btn"
          [class.active]="filters.experienceLevel === option.value"
          (click)="filters.experienceLevel = option.value; onFilterChange()"
        >
          {{ option.label }}
        </button>
      </div>
    </div>

    <div class="filter-group">
      <label class="group-label">Job Type</label>
      <div class="btn-group">
        <button
          *ngFor="let option of jobTypeOptions"
          class="filter-btn"
          [class.active]="filters.jobType === option.value"
          (click)="filters.jobType = option.value; onFilterChange()"
        >
          {{ option.label }}
        </button>
      </div>
    </div>

    <div class="filter-group">
      <label class="group-label">Location</label>
      <div class="btn-group">
        <button
          *ngFor="let option of locationOptions"
          class="filter-btn"
          [class.active]="filters.location === option.value"
          (click)="filters.location = option.value; onFilterChange()"
        >
          {{ option.label }}
        </button>
      </div>
    </div>

    <div class="filter-group">
      <div class="label-row">
        <label class="group-label">Suggested Skills</label>
        <span class="helper-copy">Quick narrowing</span>
      </div>
      <div class="skill-pills">
        <button
          *ngFor="let skill of skillOptions"
          class="skill-pill"
          [class.active]="filters.skills === skill"
          (click)="selectSkill(skill)"
        >
          {{ skill }}
        </button>
      </div>
    </div>

    <div class="draft-note" [class.pending]="hasPendingChanges">
      <span *ngIf="hasPendingChanges">You have unapplied filter changes.</span>
      <span *ngIf="!hasPendingChanges && hasActiveFilters">Current results reflect your active filters.</span>
      <span *ngIf="!hasPendingChanges && !hasActiveFilters">Showing your default personalized job feed.</span>
    </div>
  </div>
</div>
