<div class="maintenance-backdrop" role="dialog" aria-modal="true" aria-labelledby="maintenance-title">
  <div class="maintenance-modal">
    <div class="maintenance-badge">Maintenance Mode</div>
    <h2 id="maintenance-title">Application is under maintenance</h2>

  </div>
</div>
