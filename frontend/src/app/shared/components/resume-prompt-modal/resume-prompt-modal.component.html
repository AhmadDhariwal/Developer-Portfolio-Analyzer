<div class="modal-backdrop">
  <div class="modal-container" (click)="$event.stopPropagation()">

    <!-- ✕ Close — session-only dismiss (remind me later) -->
    <button class="close-btn" (click)="onCloseLater()" title="Remind me later" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>

    <div class="modal-content">
      <!-- Icon -->
      <div class="icon-header" [class.pulse]="!isProcessing">
        <svg *ngIf="state === 'UPLOAD'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <svg *ngIf="state === 'SET_DEFAULT'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <path d="M9 15l2 2 4-4"></path>
        </svg>
      </div>

      <!-- Heading -->
      <h2>{{ state === 'UPLOAD' ? 'Complete Your Profile' : 'Set Default Resume' }}</h2>

      <!-- Body text -->
      <p>
        {{ state === 'UPLOAD'
          ? 'Upload your resume to get personalized recommendations and better results tailored to your profile.'
          : 'You\'ve uploaded a resume. Set it as default to ensure accurate and personalized results.' }}
      </p>

      <!-- Actions -->
      <div class="actions">
        <!-- Primary CTA -->
        <button class="btn-primary" (click)="onPrimaryAction()" [disabled]="isProcessing">
          <span *ngIf="!isProcessing">
            {{ state === 'UPLOAD' ? 'Upload Resume' : 'Set as Default' }}
          </span>
          <span *ngIf="isProcessing" class="loader"></span>
        </button>

        <!-- Secondary links -->
        <div class="secondary-actions">
          <button class="btn-link" (click)="onRemindTomorrow()">Remind me tomorrow</button>
          <button class="btn-link" (click)="onCloseLater()">Remind me later</button>
          <button class="btn-link danger" (click)="onNeverShow()">Don't show again</button>
        </div>
      </div>
    </div>

  </div>
</div>
