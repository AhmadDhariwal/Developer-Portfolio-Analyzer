<div class="auth-page">
  <div class="auth-container">
    <!-- Brand Section with Home Link -->
    <div class="auth-brand">
      <a routerLink="/" class="home-link">Back to Home</a>
      <h1 class="logo">DevInsight AI</h1>
      <p class="tagline">Start analyzing your developer career today</p>
    </div>

    <!-- Auth Card -->
    <app-ui-card class="auth-card">
      <div class="auth-header">
        <h2>Create Account</h2>
        <p>Join DevInsight AI to get personalized career insights</p>
      </div>

      <!-- Error Message -->
      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <!-- Signup Form -->
      <form class="auth-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input
            id="name"
            type="text"
            [(ngModel)]="name"
            name="name"
            placeholder="Your full name"
            required />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="you@example.com"
            required />
        </div>

        <div class="form-group">
          <label>OTP Delivery</label>
          <div class="otp-type-row">
            <label><input type="radio" name="otpType" value="email" [(ngModel)]="otpType" /> Email</label>
            <label><input type="radio" name="otpType" value="phone" [(ngModel)]="otpType" /> Phone</label>
          </div>
        </div>

        <div class="form-group" *ngIf="otpType === 'phone'">
          <label for="countryCode">Country Code</label>
          <app-country-code-dropdown [(value)]="countryCode"></app-country-code-dropdown>
        </div>

        <div class="form-group" *ngIf="otpType === 'phone'">
          <label for="phoneNumber">Phone Number</label>
          <input
            id="phoneNumber"
            type="text"
            [(ngModel)]="phoneNumber"
            name="phoneNumber"
            placeholder="3001234567"
            required />
        </div>
        
        <div class="form-group">
          <label for="githubUsername">GitHub Username</label>
          <input
            id="githubUsername"
            type="text"
            [(ngModel)]="githubUsername"
            name="githubUsername"
            placeholder="e.g. janesmith"
            required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Create a strong password"
            required />
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input
            id="confirm-password"
            type="password"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="Re-enter your password"
            required />
        </div>

        <div class="form-group checkbox">
          <input
            id="terms"
            type="checkbox"
            [(ngModel)]="agreeToTerms"
            name="agreeToTerms" />
          <label for="terms">
            I agree to the <a href="#">Terms of Service</a> and <a routerLink="/privacy">Privacy Policy</a>
          </label>
        </div>

        <app-ui-button type="submit" variant="primary" [fullWidth]="true" [loading]="isLoading">
          Create Account
        </app-ui-button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <span>or continue with</span>
      </div>

      <!-- GitHub Sign Up -->
      <button (click)="signupWithGithub()" class="github-button">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
        </svg>
        Sign up with GitHub
      </button>

      <!-- Login Link -->
      <div class="auth-footer">
        <p>Already have an account? <a routerLink="/auth/login">Sign in</a></p>
      </div>
    </app-ui-card>
  </div>

  <!-- Background Gradient -->
  <div class="auth-background">
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
  </div>
</div>
