<div class="auth-page">
  <div class="auth-container">
    <!-- Brand Section with Home Link -->
    <div class="auth-brand">
      <a routerLink="/" class="home-link">Back to Home</a>
      <h1 class="logo">DevInsight AI</h1>
      <p class="tagline">Your AI-powered developer career analyzer</p>
    </div>

    <!-- Auth Card -->
    <app-ui-card class="auth-card">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Sign in to your DevInsight AI account</p>
      </div>

      <!-- Error Message -->
      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <!-- Login Form -->
      <form class="auth-form" (ngSubmit)="onSubmit()">
        <div class="form-group" [class.has-error]="fieldErrors['email']">
          <label for="email">Email Address</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="you@example.com"
            (blur)="validateEmail()"
            (input)="validateEmail()" />
          <span *ngIf="fieldErrors['email']" class="field-error">{{ fieldErrors['email'] }}</span>
        </div>

        <div class="form-group" [class.has-error]="fieldErrors['password']">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            (blur)="validatePassword()"
            (input)="validatePassword()" />
          <a routerLink="/auth/forgot-password" class="forgot-password">Forgot password?</a>
          <span *ngIf="fieldErrors['password']" class="field-error">{{ fieldErrors['password'] }}</span>
        </div>

        <app-ui-button type="submit" variant="primary" [fullWidth]="true" [loading]="isLoading">
          Sign In
        </app-ui-button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <span>or continue with</span>
      </div>

      <!-- GitHub Sign In -->
      <button (click)="loginWithGithub()" class="github-button">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
        </svg>
        Sign in with GitHub
      </button>

      <!-- Sign Up Link -->
      <div class="auth-footer">
        <p>Don't have an account? <a routerLink="/auth/signup">Sign up</a></p>
      </div>
    </app-ui-card>
  </div>

  <!-- Background Gradient -->
  <div class="auth-background">
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
  </div>
</div>
