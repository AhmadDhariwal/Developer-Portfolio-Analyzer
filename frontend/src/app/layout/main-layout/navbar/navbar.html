<nav class="navbar" [class.sidebar-closed]="!sidebarOpen">
  <!-- Left: hamburger toggle -->
  <div class="navbar-left">
    <button class="menu-toggle" (click)="toggleSidebar()" title="Toggle sidebar" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="8" x2="21" y2="8"></line>
        <line x1="3" y1="16" x2="21" y2="16"></line>
      </svg>
    </button>

    <!-- Search bar -->
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input
        type="text"
        placeholder="Search repositories, skills..."
        autocomplete="off"
        [value]="searchQuery"
        (input)="onSearchInput($event)"
        (blur)="closeSearch()"
        (focus)="showSuggestions = suggestions.length > 0"
      />
      <!-- Suggestions dropdown -->
      <div class="search-suggestions" *ngIf="showSuggestions">
        <div
          *ngFor="let s of suggestions"
          class="suggestion-item"
          [class.suggestion-page]="s.type === 'page'"
          [class.suggestion-repo]="s.type === 'repo'"
          [class.suggestion-skill]="s.type === 'skill'"
          (mousedown)="selectSuggestion(s)"
        >
          <span class="suggestion-icon">
            <svg *ngIf="s.type === 'page'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <svg *ngIf="s.type === 'repo'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
            </svg>
            <svg *ngIf="s.type === 'skill'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline>
            </svg>
          </span>
          <span class="suggestion-text">
            <span class="suggestion-label">{{ s.label }}</span>
            <span class="suggestion-sub" *ngIf="s.sublabel">{{ s.sublabel }}</span>
          </span>
          <span class="suggestion-badge">{{ s.type }}</span>
        </div>
      </div>
    </div>

    <div class="team-switcher" *ngIf="organizations.length > 0">
      <div class="switcher-group">
        <label>Organization</label>
        <select
          class="switch-select"
          title="Select organization context"
          [ngModel]="selectedOrganizationId"
          (ngModelChange)="onOrganizationSwitch($event)">
          <option value="">Select organization</option>
          <option *ngFor="let org of organizations" [value]="org._id">{{ org.name }}</option>
        </select>
      </div>

      <div class="switcher-group">
        <label>Team</label>
        <select
          class="switch-select"
          title="Select team context"
          [ngModel]="selectedTeamId"
          (ngModelChange)="onTeamSwitch($event)">
          <option value="">All teams</option>
          <option *ngFor="let team of teams" [value]="team._id">{{ team.name }}</option>
        </select>
      </div>

      <span class="role-badge" *ngIf="selectedRole">{{ selectedRole }}</span>
    </div>
  </div>

  <!-- Right: actions + avatar -->
  <div class="navbar-right">
    <!-- Notification Bell -->
    <button class="icon-btn" title="Notifications" aria-label="Notifications" (click)="toggleNotifications()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
      <span class="notif-dot" *ngIf="unreadNotifications > 0"></span>
      <span class="notif-count" *ngIf="unreadNotifications > 0">{{ unreadNotifications > 9 ? '9+' : unreadNotifications }}</span>
    </button>

    <div class="notifications-dropdown" *ngIf="showNotifications">
      <div class="notif-header">
        <h4>Notifications</h4>
        <button type="button" class="mark-all-btn" (click)="markAllNotificationsRead()" [disabled]="unreadNotifications === 0">
          Mark all read
        </button>
      </div>

      <div class="notif-list" *ngIf="notifications.length > 0; else noNotif">
        <button
          type="button"
          class="notif-item"
          [class.notif-item--unread]="!n.isRead"
          *ngFor="let n of notifications"
          (click)="markNotificationRead(n)">
          <div class="notif-item__title">{{ n.title }}</div>
          <div class="notif-item__message">{{ n.message }}</div>
          <div class="notif-item__time">{{ formatNotificationTime(n.createdAt) }}</div>
        </button>
      </div>

      <ng-template #noNotif>
        <div class="notif-empty">No notifications yet.</div>
      </ng-template>
    </div>

    <!-- User avatar block with dropdown -->
    <div class="user-avatar-block" *ngIf="(isLoggedIn$ | async)">
      <button class="avatar-button" (click)="toggleUserMenu()">
        <div class="avatar-circle">
          <span>{{ userInitial }}</span>
        </div>
        <div class="user-info">
          <span class="user-name">{{ userName }}</span>
          <span class="user-handle">@{{ userHandle }}</span>
        </div>
      </button>

      <!-- User Dropdown Menu -->
      <div class="user-dropdown" *ngIf="showUserMenu">
        <a routerLink="/app/profile" class="dropdown-item" (click)="closeUserMenu()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <span>Profile</span>
        </a>
        <a routerLink="/app/dashboard" class="dropdown-item" (click)="closeUserMenu()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
          <span>Dashboard</span>
        </a>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item logout" (click)="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          <span>Logout</span>
        </button>
      </div>
    </div>

    <!-- Auth buttons when logged out -->
    <div class="auth-btns" *ngIf="!(isLoggedIn$ | async)">
      <a routerLink="/auth/login" class="nav-link-btn">Log In</a>
      <a routerLink="/auth/signup" class="nav-btn-primary">Sign Up</a>
    </div>
  </div>
</nav>
