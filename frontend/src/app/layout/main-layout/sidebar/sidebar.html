<aside class="sidebar" [class.open]="isOpen" [class.closed]="!isOpen">
  <!-- Logo area inside sidebar -->
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
      </svg>
    </div>
    <span class="logo-text">DevInsight <span class="ai-tag">AI</span></span>
    <button class="collapse-btn" (click)="collapse.emit()" title="Collapse sidebar" aria-label="Collapse sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
  </div>

  <nav class="sidebar-nav">
    <ul class="nav-menu">
      <li *ngFor="let item of visibleNavItems">
        <a [routerLink]="item.route" routerLinkActive="active" class="nav-link">
          <span class="nav-icon" [innerHTML]="item.icon"></span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      </li>

      <li *ngFor="let group of visibleNavGroups" class="nav-group">
        <div class="nav-group-header">
          <a [routerLink]="group.route" routerLinkActive="active" class="nav-link nav-group-link">
            <span class="nav-icon" [innerHTML]="group.icon"></span>
            <span class="nav-label">{{ group.label }}</span>
          </a>
          <button class="group-toggle" (click)="toggleGroup(group.label)" [attr.aria-expanded]="isGroupOpen(group.label)" title="Toggle menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>
        </div>
        <ul class="nav-submenu" [class.collapsed]="!isGroupOpen(group.label)">
          <li *ngFor="let item of group.items">
            <a [routerLink]="item.route" routerLinkActive="active" class="nav-link nav-sublink">
              <span class="nav-icon" [innerHTML]="item.icon"></span>
              <span class="nav-label">{{ item.label }}</span>
            </a>
          </li>
        </ul>
      </li>
    </ul>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-user-card">
      <div class="sidebar-user-avatar">
        <img *ngIf="userAvatar; else sidebarAvatarFallback"
             [src]="getAvatarSrc()"
             [alt]="userName"
             title="User avatar"
             (error)="onAvatarError($event)" />
        <ng-template #sidebarAvatarFallback>
          <span>{{ userInitial }}</span>
        </ng-template>
      </div>
      <div class="sidebar-user-meta">
        <span class="sidebar-user-name">{{ userName }}</span>
        <span class="sidebar-user-handle">@{{ userHandle }}</span>
      </div>
    </div>

    <button class="logout-btn" (click)="logout()">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </span>
      <span class="nav-label">Logout</span>
    </button>
  </div>
</aside>
