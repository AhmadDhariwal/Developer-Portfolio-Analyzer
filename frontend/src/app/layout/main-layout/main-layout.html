<div class="dashboard-shell">
  <div
    class="shell-backdrop"
    *ngIf="isMobile() && sidebarOpen()"
    (click)="closeSidebar()"
    aria-hidden="true"></div>

  <app-sidebar
    [isOpen]="sidebarOpen()"
    [isMobile]="isMobile()"
    (collapse)="closeSidebar()"></app-sidebar>

  <div
    class="shell-body"
    [class.sidebar-closed]="!sidebarOpen()"
    [class.shell-body--mobile]="isMobile()">
    <app-navbar [sidebarOpen]="sidebarOpen()" (sidebarToggle)="toggleSidebar()"></app-navbar>
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<!-- Resume Onboarding Prompt -->
<ng-container *ngIf="onboardingStatus$ | async as status">
  <app-resume-prompt-modal
    *ngIf="status.state"
    [state]="status.state"
    [isLoading]="status.loading"
    (upload)="handleUpload()"
    (setDefault)="handleSetDefault()"
    (dismiss)="handleDismiss($event)"
  ></app-resume-prompt-modal>
</ng-container>
