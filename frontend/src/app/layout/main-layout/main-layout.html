<div class="dashboard-shell">
  <app-sidebar [isOpen]="sidebarOpen()" (collapse)="toggleSidebar()"></app-sidebar>

  <div class="shell-body" [class.sidebar-closed]="!sidebarOpen()">
    <app-navbar [sidebarOpen]="sidebarOpen()" (sidebarToggle)="toggleSidebar()"></app-navbar>
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<!-- Resume Onboarding Prompt -->
<app-resume-prompt-modal
  *ngIf="(onboardingStatus$ | async)?.state as state"
  [state]="state"
  [isLoading]="(onboardingStatus$ | async)?.loading || false"
  (upload)="handleUpload()"
  (setDefault)="handleSetDefault()"
  (dismiss)="handleDismiss($event)"
></app-resume-prompt-modal>
