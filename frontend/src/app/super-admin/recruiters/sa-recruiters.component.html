<div class="sa-page">
  <div class="sa-header"><h1>Recruiters</h1><p>All recruiters across the platform.</p></div>
  <div class="sa-filters">
    <input [(ngModel)]="search" placeholder="Search by name or email..." (keydown.enter)="load(1)" />
    <select [(ngModel)]="organizationId" (change)="load(1)">
      <option value="">All organizations</option>
      <option *ngFor="let o of organizations" [value]="o._id">{{ o.name }}</option>
    </select>
    <select [(ngModel)]="active" (change)="load(1)">
      <option value="">All status</option>
      <option value="true">Active</option>
      <option value="false">Revoked</option>
    </select>
    <button class="primary" (click)="load(1)">Search</button>
    <button class="ghost" (click)="search=''; load(1)">Reset</button>
    <span class="spacer"></span>
    <button class="primary" (click)="openCreate()">Add Recruiter</button>
  </div>
  <div class="sa-full-table">
    <div class="sa-table-head"><strong>{{ total }} recruiters</strong></div>
    <div *ngIf="loading" class="sa-state">Loading...</div>
    <table *ngIf="!loading && recruiters.length > 0">
      <thead><tr><th>Name</th><th>Email</th><th>Organization</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
      <tbody>
        <tr *ngFor="let r of recruiters">
          <td>{{ r.name }}</td>
          <td>{{ r.email }}</td>
          <td>{{ r.organizationId?.name || 'N/A' }}</td>
          <td><span class="badge" [class.badge--green]="r.isActive" [class.badge--red]="!r.isActive">{{ r.isActive ? 'Active' : 'Inactive' }}</span></td>
          <td>{{ r.createdAt | date:'mediumDate' }}</td>
          <td>
            <a class="action-btn action-btn--primary" [routerLink]="['/super-admin/users', r._id]">Details</a>
            <button class="action-btn action-btn--edit" (click)="openEdit(r)">Edit</button>
            <button class="action-btn" [class.action-btn--danger]="r.isActive" [class.action-btn--success]="!r.isActive" (click)="toggle(r)">{{ r.isActive ? 'Revoke' : 'Restore' }}</button>
          </td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="!loading && recruiters.length === 0" class="sa-empty">No recruiters found.</div>
    <sa-pager [page]="page" [totalPages]="totalPages" [total]="total" [pageSize]="pageSize" (change)="load($event)" />
  </div>
</div>

<sa-user-form-modal
  [open]="formOpen"
  [mode]="formMode"
  role="recruiter"
  [organizations]="organizations"
  [user]="selected"
  [busy]="formBusy"
  [error]="formError"
  (close)="formOpen=false"
  (save)="save($event)"
/>
