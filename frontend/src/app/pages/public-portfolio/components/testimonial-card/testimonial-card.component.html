<article class="testimonial-card">
  <p class="quote">“{{ testimonial.quote }}”</p>

  <div class="person">
    <img
      *ngIf="hasAvatar"
      [src]="testimonial.avatarUrl"
      [alt]="testimonial.name"
      class="avatar"
      loading="lazy"
      decoding="async"
      (error)="onAvatarError($event)"
    />
    <div class="identity">
      <h4>{{ testimonial.name }}</h4>
      <span>{{ testimonial.role }}</span>
    </div>
  </div>
</article>
