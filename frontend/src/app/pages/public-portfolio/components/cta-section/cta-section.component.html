<section class="cta-section reveal-on-scroll" id="cta">
  <div class="cta-panel">
    <h2>{{ heading }}</h2>
    <p>{{ subtext }}</p>

    <div class="cta-actions">
      <a class="cta-btn primary" href="#contact" (click)="onPrimaryClick($event)">{{ primaryLabel }}</a>
      <a class="cta-btn secondary" *ngIf="resumeAvailable; else resumeUnavailable" [attr.href]="resumeUrl">{{ secondaryLabel }}</a>
      <ng-template #resumeUnavailable>
        <span class="cta-btn secondary is-disabled" aria-disabled="true">Resume not available</span>
      </ng-template>
    </div>
  </div>
</section>
