<div class="overlay" *ngIf="open">
  <div class="dialog-card" role="dialog" aria-modal="true" [attr.aria-label]="title">
    <h3 class="dialog-title">{{ title }}</h3>
    <p class="dialog-message">{{ message }}</p>
    <div class="actions">
      <button type="button" class="cancel" (click)="cancelled.emit()">{{ cancelText }}</button>
      <button type="button" class="confirm" (click)="confirmed.emit()">{{ confirmText }}</button>
    </div>
  </div>
</div>
