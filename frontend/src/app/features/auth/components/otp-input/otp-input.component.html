<div class="otp-grid">
  <input
    *ngFor="let digit of digits; let i = index; trackBy: trackByFn"
    #otpCell
    type="text"
    [value]="digit"
    inputmode="numeric"
    autocomplete="one-time-code"
    (input)="onInput(i, $event)"
    (keydown)="onKeyDown(i, $event)"
    (paste)="onPaste($event)"
    class="otp-cell"
  />
</div>
