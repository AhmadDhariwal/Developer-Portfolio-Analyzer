<div class="auth-page">
  <div class="auth-container">
    <app-ui-card class="auth-card">
      <h2>Forgot Password</h2>
      <p class="hint">Choose where to receive OTP.</p>

      <div *ngIf="error" class="error-message">{{ error }}</div>

      <div class="type-row">
        <label><input type="radio" name="type" value="email" [(ngModel)]="type" /> Email</label>
        <label><input type="radio" name="type" value="phone" [(ngModel)]="type" /> Phone</label>
      </div>

      <div *ngIf="type === 'email'" class="form-group">
        <label>Email</label>
        <input [(ngModel)]="email" name="email" type="email" placeholder="you@example.com" />
      </div>

      <div *ngIf="type === 'phone'" class="form-group">
        <label>Country Code</label>
        <app-country-code-dropdown [(value)]="countryCode"></app-country-code-dropdown>
      </div>

      <div *ngIf="type === 'phone'" class="form-group">
        <label>Phone Number</label>
        <input [(ngModel)]="phoneNumber" name="phoneNumber" type="text" placeholder="3001234567" />
      </div>

      <app-ui-button variant="primary" [fullWidth]="true" [loading]="isLoading" (click)="submit()">
        Send OTP
      </app-ui-button>

      <a routerLink="/auth/login" class="back-link">Back to login</a>
    </app-ui-card>
  </div>
</div>
