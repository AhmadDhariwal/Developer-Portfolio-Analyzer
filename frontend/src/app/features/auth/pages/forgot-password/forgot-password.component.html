<div class="auth-page">
  <div class="auth-container">
    <app-ui-card class="auth-card" (keydown.enter)="submit()">
      <div class="form-content">
        <h2>Forgot Password</h2>
        <p class="hint">Choose where to receive OTP.</p>

        <div *ngIf="error" class="error-message">{{ error }}</div>

        <div class="type-segmentation">
          <label [class.active]="type === 'email'">
            <input type="radio" name="type" value="email" [(ngModel)]="type" class="hidden-radio" />
            <i class="icon">📧</i> Email
          </label>
          <label [class.active]="type === 'phone'">
            <input type="radio" name="type" value="phone" [(ngModel)]="type" class="hidden-radio" />
            <i class="icon">📱</i> Phone
          </label>
        </div>

        <div *ngIf="type === 'email'" class="form-group slide-in">
          <label>Email Address</label>
          <div class="input-wrapper">
            <input [(ngModel)]="email" name="email" type="email" placeholder="you@example.com" />
          </div>
        </div>

        <div *ngIf="type === 'phone'" class="form-group slide-in">
          <label>Country Code</label>
          <app-country-code-dropdown [(value)]="countryCode"></app-country-code-dropdown>
        </div>

        <div *ngIf="type === 'phone'" class="form-group slide-in">
          <label>Phone Number</label>
          <div class="input-wrapper">
            <input [(ngModel)]="phoneNumber" name="phoneNumber" type="text" placeholder="300 123 4567" />
          </div>
        </div>

        <app-ui-button variant="primary" [fullWidth]="true" [loading]="isLoading" (click)="submit()">
          Send OTP
        </app-ui-button>

        <a routerLink="/auth/login" class="back-link">Back to login</a>
      </div>
    </app-ui-card>
  </div>
</div>
