<div class="auth-page">
  <div class="auth-container">
    <app-ui-card class="auth-card" (keydown.enter)="submit()">
      <div class="form-content">
        <h2>Reset Password</h2>
        <p class="hint">Set a new password for your account.</p>

        <div *ngIf="error" class="error-message">{{ error }}</div>
        <div *ngIf="success" class="success-message">{{ success }}</div>

        <div class="form-group slide-in">
          <label>New Password</label>
          <div class="input-wrapper">
            <input [(ngModel)]="newPassword" name="newPassword" type="password" placeholder="Enter new password" />
          </div>
        </div>
        <div class="form-group slide-in" style="animation-delay: 50ms;">
          <label>Confirm Password</label>
          <div class="input-wrapper">
            <input [(ngModel)]="confirmPassword" name="confirmPassword" type="password" placeholder="Confirm your password" />
          </div>
        </div>

        <app-ui-button variant="primary" [fullWidth]="true" [loading]="isLoading" (click)="submit()">
          Reset Password
        </app-ui-button>

        <a routerLink="/auth/login" class="back-link">Back to login</a>
      </div>
    </app-ui-card>
  </div>
</div>
