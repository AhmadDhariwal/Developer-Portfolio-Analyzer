<div class="auth-page">
  <div class="auth-container">
    <app-ui-card class="auth-card">
      <h2>Reset Password</h2>
      <p class="hint">Set a new password for your account.</p>

      <div *ngIf="error" class="error-message">{{ error }}</div>
      <div *ngIf="success" class="success-message">{{ success }}</div>

      <div class="form-group">
        <label>New Password</label>
        <input [(ngModel)]="newPassword" name="newPassword" type="password" />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input [(ngModel)]="confirmPassword" name="confirmPassword" type="password" />
      </div>

      <app-ui-button variant="primary" [fullWidth]="true" [loading]="isLoading" (click)="submit()">
        Reset Password
      </app-ui-button>

      <a routerLink="/auth/login" class="back-link">Back to login</a>
    </app-ui-card>
  </div>
</div>
