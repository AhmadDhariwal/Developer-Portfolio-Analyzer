<section class="admin-page">
  <header class="card">
    <h2>Recruiter Management</h2>
    <p>Create and review organization-scoped recruiters.</p>
  </header>

  <app-shared-message
    [visible]="!!message"
    [type]="messageType"
    [text]="message"
    (dismiss)="message = ''"
  ></app-shared-message>

  <app-shared-loader [loading]="loading" label="Loading recruiters"></app-shared-loader>

  <section class="card create-form">
    <h3>Create Recruiter</h3>
    <div class="grid">
      <input [(ngModel)]="form.name" placeholder="Full name" />
      <input [(ngModel)]="form.email" placeholder="Work email" />
      <input [(ngModel)]="form.password" type="password" placeholder="Temporary password" />
      <input [(ngModel)]="form.githubUsername" placeholder="GitHub username (optional)" />
    </div>
    <button (click)="createRecruiter()">Create Recruiter</button>
  </section>

  <section class="card">
    <h3>Organization Recruiters</h3>

    <app-shared-empty-state
      *ngIf="!loading && recruiters.length === 0"
      title="No recruiters found"
      subtitle="Create your first recruiter to start candidate matching workflows."
    ></app-shared-empty-state>

    <div class="table-wrap" *ngIf="recruiters.length > 0">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>GitHub</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let recruiter of recruiters">
            <td>{{ recruiter.name }}</td>
            <td>{{ recruiter.email }}</td>
            <td>{{ recruiter.githubUsername }}</td>
            <td>{{ recruiter.createdAt | date: 'mediumDate' }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</section>
