<section class="hub-page">
  <header class="hub-header">
    <div>
      <span class="hub-kicker">Recruiter Hub</span>
      <h1>Match Results</h1>
      <p>
        Select a job, optionally narrow the candidate pool, and generate AI-ranked match results.
      </p>
    </div>
    <div class="hub-summary">
      <strong>{{ matches.length }}</strong>
      <span>Results loaded</span>
    </div>
  </header>

  <div class="metric-grid">
    <app-recruiter-stat-card
      label="Open Jobs"
      [value]="openJobsCount"
      tone="blue"
      hint="Available for AI matching"
    />
    <app-recruiter-stat-card
      label="Candidate Pool"
      [value]="candidates.length"
      tone="cyan"
      hint="Scoped profiles ready to rank"
    />
    <app-recruiter-stat-card
      label="Shortlisted"
      [value]="shortlistedCount"
      tone="green"
      hint="Converted from match results"
    />
    <app-recruiter-stat-card
      label="Rejected"
      [value]="rejectedCount"
      tone="orange"
      hint="Explicitly deprioritized"
    />
  </div>

  <div class="message message--error" *ngIf="error">{{ error }}</div>
  <div class="message message--success" *ngIf="notice">{{ notice }}</div>

  <div class="glass-form">
    <div class="field">
      <label>Select job</label>
      <app-searchable-select
        [options]="jobOptions"
        [value]="selectedJobId"
        [emptyOptionLabel]="'Choose a job'"
        (valueChange)="onJobChange($event)"
      />
    </div>
    <div class="field">
      <label>Candidate pool</label>
      <div class="selection-chip">{{ selectedCandidateIds.size || 0 }} selected</div>
    </div>
    <div class="field field--actions">
      <label>Pipeline actions</label>
      <div class="form-actions">
        <button type="button" class="ghost-btn" (click)="clearSelection()">Clear Selection</button>
        <button
          type="button"
          class="primary-btn"
          [disabled]="!selectedJobId || generating"
          (click)="runMatches()"
        >
          {{ generating ? 'Generating...' : 'Generate Matches' }}
        </button>
      </div>
    </div>
  </div>

  <app-recruiter-loader
    *ngIf="candidatesLoading"
    label="Loading candidate pool..."
    variant="pills"
    [count]="8"
  />

  <div class="candidate-picker" *ngIf="!candidatesLoading && candidates.length > 0">
    <button
      type="button"
      class="candidate-pill"
      *ngFor="let candidate of candidates; trackBy: trackByItem"
      [class.candidate-pill--active]="isCandidateSelected(candidate)"
      (click)="toggleCandidate(candidate)"
    >
      <strong>{{ candidate.name || candidate.fullName }}</strong>
      <span
        >{{ candidate.stack || 'Generalist' }} |
        {{ candidate.readinessScore || candidate.score || 0 }}</span
      >
    </button>
  </div>

  <app-recruiter-loader
    *ngIf="matchesLoading"
    label="Loading matches..."
    variant="cards"
    [count]="3"
  />

  <div class="card-grid" *ngIf="!matchesLoading && matches.length > 0">
    <app-match-card
      *ngFor="let match of matches; trackBy: trackByItem"
      [match]="match"
      (shortlist)="shortlist(match)"
      (compare)="compare(match)"
      (reject)="updateStatus(match, 'rejected')"
      (reset)="updateStatus(match, 'generated')"
    />
  </div>

  <app-recruiter-empty-state
    *ngIf="!matchesLoading && matches.length === 0"
    title="No match results yet"
    message="Choose a job and run AI ranking to build live match results for your pipeline."
  />
</section>
