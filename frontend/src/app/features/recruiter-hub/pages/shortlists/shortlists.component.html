<section class="hub-page">
  <header class="hub-header">
    <div>
      <span class="hub-kicker">Recruiter Hub</span>
      <h1>Shortlists</h1>
      <p>
        Track the candidates already moved into your pipeline and push them through the next
        follow-up stage.
      </p>
    </div>
  </header>

  <div class="metric-grid">
    <app-recruiter-stat-card
      label="Shortlisted"
      [value]="shortlists.length"
      tone="blue"
      hint="Candidates in your pipeline"
    />
    <app-recruiter-stat-card
      label="Active Follow-up"
      [value]="activeCount"
      tone="cyan"
      hint="Still moving through stages"
    />
    <app-recruiter-stat-card
      label="Interviews"
      [value]="interviewCount"
      tone="green"
      hint="Reached interview stage"
    />
  </div>

  <div class="message message--error" *ngIf="error">{{ error }}</div>
  <div class="message message--success" *ngIf="notice">{{ notice }}</div>

  <app-recruiter-loader
    *ngIf="loading"
    label="Loading shortlists..."
    variant="cards"
    [count]="3"
  />

  <div class="card-grid" *ngIf="!loading && shortlists.length > 0">
    <app-shortlist-card
      *ngFor="let item of shortlists; trackBy: trackByShortlist"
      [item]="item"
      (edit)="advance(item)"
      (remove)="remove(item)"
    />
  </div>

  <app-recruiter-empty-state
    *ngIf="!loading && shortlists.length === 0"
    title="No shortlists yet"
    message="Shortlist candidates from match results or the candidate profile to start follow-up tracking."
  />

  <app-confirm-dialog
    [open]="confirmState().open"
    [title]="confirmState().title"
    [message]="confirmState().message"
    [confirmText]="confirmState().confirmText"
    cancelText="Cancel"
    (confirmed)="onConfirmAccepted()"
    (cancelled)="onConfirmCancelled()"
  />
</section>
